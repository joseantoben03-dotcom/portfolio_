<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages Dashboard — Joseph A. Benedict</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c9a96e;--gold-light:#e8cfa0;
  --bg:#080c14;--bg2:#0d1220;--bg3:#111827;
  --card:rgba(255,255,255,0.03);
  --border:rgba(201,169,110,0.18);--border-light:rgba(255,255,255,0.07);
  --text:#f0ece4;--muted:#8a8070;--dim:#4a4540;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24;
}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
header{
  background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:1.2rem 2rem;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
}
.header-brand{display:flex;align-items:center;gap:1rem;}
.header-brand i{color:var(--gold);font-size:1.3rem;}
.header-brand h1{font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;color:var(--gold);letter-spacing:0.1em;}
.header-brand p{font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;font-family:'Space Mono',monospace;}
.header-right{display:flex;align-items:center;gap:1rem;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.btn-refresh{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:0.5rem 1rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;
  font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.25s;
}
.btn-refresh:hover{border-color:var(--gold);color:var(--gold);}

/* ── Main ── */
main{max-width:1300px;margin:0 auto;padding:2.5rem 2rem;}

/* ── Stats Cards ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.5rem;}
.stat-card{
  background:var(--card);border:1px solid var(--border-light);
  padding:1.5rem;transition:border-color 0.3s;
}
.stat-card:hover{border-color:var(--border);}
.stat-card .label{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-bottom:0.5rem;}
.stat-card .value{font-size:2rem;font-weight:300;color:var(--gold);line-height:1;margin-bottom:0.25rem;}
.stat-card .sub{font-size:0.72rem;color:var(--muted);}
.stat-card .icon{font-size:1.2rem;color:var(--gold);opacity:0.4;float:right;margin-top:-2rem;}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.toolbar-left{display:flex;align-items:center;gap:0.75rem;}
.search-box{
  background:var(--card);border:1px solid var(--border-light);
  color:var(--text);padding:0.6rem 1rem;font-family:'Outfit',sans-serif;
  font-size:0.85rem;font-weight:300;width:260px;transition:border-color 0.3s;
}
.search-box::placeholder{color:var(--dim);}
.search-box:focus{outline:none;border-color:var(--gold);}
.filter-select{
  background:var(--card);border:1px solid var(--border-light);
  color:var(--muted);padding:0.6rem 1rem;font-family:'Space Mono',monospace;
  font-size:0.65rem;letter-spacing:0.1em;cursor:pointer;
}
.filter-select:focus{outline:none;border-color:var(--gold);}
.total-label{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--dim);letter-spacing:0.1em;}

/* ── Table ── */
.table-wrap{border:1px solid var(--border-light);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:rgba(201,169,110,0.06);border-bottom:1px solid var(--border);}
thead th{
  padding:1rem 1.25rem;text-align:left;
  font-family:'Space Mono',monospace;font-size:0.6rem;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:400;
  white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--gold-light);}
thead th .sort-icon{margin-left:0.4rem;opacity:0.4;font-size:0.55rem;}
tbody tr{border-bottom:1px solid var(--border-light);transition:background 0.2s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(201,169,110,0.04);}
tbody td{padding:1rem 1.25rem;vertical-align:top;}
.td-num{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--dim);}
.td-name{font-weight:400;font-size:0.92rem;}
.td-email{font-size:0.78rem;color:var(--muted);font-family:'Space Mono',monospace;margin-top:0.15rem;}
.td-subject{font-size:0.85rem;color:var(--text);}
.td-msg{
  font-size:0.82rem;color:var(--muted);font-weight:300;
  max-width:320px;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.td-date{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--dim);white-space:nowrap;}
.td-actions{white-space:nowrap;}
.btn-view,.btn-del{
  background:transparent;border:1px solid var(--border-light);
  color:var(--muted);padding:0.35rem 0.7rem;font-size:0.62rem;
  cursor:pointer;transition:all 0.2s;font-family:'Space Mono',monospace;
  letter-spacing:0.05em;margin-right:0.35rem;
}
.btn-view:hover{border-color:var(--gold);color:var(--gold);}
.btn-del:hover{border-color:var(--red);color:var(--red);}

/* ── Loading / Empty / Error states ── */
.state-row td{text-align:center;padding:4rem 2rem;}
.spinner{
  width:32px;height:32px;border:2px solid var(--border-light);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.7s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg);}}
.state-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.25;}
.state-text{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--dim);letter-spacing:0.1em;}

/* ── Message Detail Modal ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);
  z-index:1000;align-items:center;justify-content:center;padding:2rem;
  backdrop-filter:blur(12px);
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  max-width:580px;width:100%;max-height:85vh;overflow-y:auto;
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);
}
.modal-head h2{font-size:1rem;font-weight:400;color:var(--text);}
.modal-close{
  background:transparent;border:1px solid var(--border-light);
  color:var(--muted);width:30px;height:30px;cursor:pointer;
  font-size:0.9rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{border-color:var(--gold);color:var(--gold);}
.modal-body{padding:1.5rem;}
.modal-field{margin-bottom:1.25rem;}
.modal-field label{
  font-family:'Space Mono',monospace;font-size:0.6rem;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);
  display:block;margin-bottom:0.35rem;
}
.modal-field p{font-size:0.9rem;color:var(--text);font-weight:300;line-height:1.7;}
.modal-field a{color:var(--gold);text-decoration:none;font-size:0.85rem;}
.modal-field a:hover{text-decoration:underline;}
.modal-msg{
  background:var(--card);border:1px solid var(--border-light);
  padding:1rem 1.25rem;font-size:0.88rem;color:var(--muted);
  line-height:1.8;font-weight:300;
}

/* ── Pagination ── */
.pagination{display:flex;justify-content:center;align-items:center;gap:0.5rem;margin-top:1.5rem;}
.pg-btn{
  background:transparent;border:1px solid var(--border-light);
  color:var(--muted);width:34px;height:34px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:0.7rem;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.pg-btn:hover,.pg-btn.active{border-color:var(--gold);color:var(--gold);}
.pg-btn:disabled{opacity:0.3;cursor:default;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  background:var(--bg2);border:1px solid var(--border);
  padding:0.9rem 1.4rem;font-family:'Space Mono',monospace;
  font-size:0.68rem;letter-spacing:0.1em;color:var(--gold);
  transform:translateY(100px);opacity:0;transition:all 0.35s;z-index:9999;
}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .td-msg{display:none;}
  .td-num{display:none;}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr;}
  main{padding:1.5rem 1rem;}
  .search-box{width:100%;}
  header{padding:1rem;}
  .td-subject{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <i class="fas fa-inbox"></i>
    <div>
      <h1>Messages Dashboard</h1>
      <p>Joseph Antony Benedict J</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" title="Connected"></div>
    <button class="btn-refresh" onclick="loadMessages()"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Total Messages</div>
      <div class="value" id="statTotal">—</div>
      <div class="sub">All time</div>
      <i class="fas fa-envelope icon"></i>
    </div>
    <div class="stat-card">
      <div class="label">Today</div>
      <div class="value" id="statToday">—</div>
      <div class="sub">Messages today</div>
      <i class="fas fa-calendar-day icon"></i>
    </div>
    <div class="stat-card">
      <div class="label">This Week</div>
      <div class="value" id="statWeek">—</div>
      <div class="sub">Last 7 days</div>
      <i class="fas fa-chart-line icon"></i>
    </div>
    <div class="stat-card">
      <div class="label">Latest From</div>
      <div class="value" style="font-size:1rem;padding-top:0.3rem;" id="statLatest">—</div>
      <div class="sub" id="statLatestTime">No messages yet</div>
      <i class="fas fa-user icon"></i>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input class="search-box" type="text" id="searchInput" placeholder="Search by name, email, subject…" oninput="applyFilters()">
      <select class="filter-select" id="sortSelect" onchange="applyFilters()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="name">By Name</option>
      </select>
    </div>
    <span class="total-label" id="totalLabel">Loading…</span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Sender</th>
          <th>Subject</th>
          <th>Message</th>
          <th>Received</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="state-row"><td colspan="6">
          <div class="spinner"></div>
          <div class="state-text">Fetching messages…</div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<!-- Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Message Detail</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field"><label>From</label><p id="mName"></p></div>
      <div class="modal-field"><label>Email</label><p><a id="mEmail" href="#"></a></p></div>
      <div class="modal-field"><label>Subject</label><p id="mSubject"></p></div>
      <div class="modal-field"><label>Received</label><p id="mDate"></p></div>
      <div class="modal-field"><label>Message</label><div class="modal-msg" id="mMsg"></div></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://portfolio-amber-nine-66.vercel.app/messages';
const PER_PAGE = 15;
let allMessages = [];
let filtered = [];
let currentPage = 1;

async function loadMessages() {
  setLoading();
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allMessages = await res.json();
    updateStats();
    applyFilters();
    showToast('Messages loaded');
  } catch (err) {
    setError(err.message);
  }
}

function setLoading() {
  document.getElementById('tableBody').innerHTML = `
    <tr class="state-row"><td colspan="6">
      <div class="spinner"></div>
      <div class="state-text">Fetching messages…</div>
    </td></tr>`;
}

function setError(msg) {
  document.getElementById('tableBody').innerHTML = `
    <tr class="state-row"><td colspan="6">
      <div class="state-icon">⚠️</div>
      <div class="state-text">Error: ${msg}</div>
      <br><button class="btn-refresh" style="margin-top:1rem" onclick="loadMessages()">Try Again</button>
    </td></tr>`;
  document.getElementById('totalLabel').textContent = 'Error loading';
}

function updateStats() {
  const total = allMessages.length;
  document.getElementById('statTotal').textContent = total;

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart = new Date(now - 7 * 86400000);

  const today = allMessages.filter(m => new Date(m.createdAt) >= todayStart).length;
  const week  = allMessages.filter(m => new Date(m.createdAt) >= weekStart).length;

  document.getElementById('statToday').textContent = today;
  document.getElementById('statWeek').textContent = week;

  if (allMessages.length > 0) {
    const latest = allMessages[0];
    document.getElementById('statLatest').textContent = latest.name;
    document.getElementById('statLatestTime').textContent = formatDate(latest.createdAt);
  }
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  filtered = allMessages.filter(m =>
    (m.name || '').toLowerCase().includes(q) ||
    (m.email || '').toLowerCase().includes(q) ||
    (m.subject || '').toLowerCase().includes(q) ||
    (m.message || '').toLowerCase().includes(q)
  );

  if (sort === 'newest') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  else if (sort === 'name') filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  currentPage = 1;
  renderTable();
  renderPagination();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  document.getElementById('totalLabel').textContent = `${filtered.length} message${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="6">
      <div class="state-icon" style="font-size:2rem;opacity:0.2">📭</div>
      <div class="state-text">No messages found</div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = page.map((msg, i) => `
    <tr>
      <td class="td-num">${start + i + 1}</td>
      <td>
        <div class="td-name">${esc(msg.name)}</div>
        <div class="td-email">${esc(msg.email)}</div>
      </td>
      <td class="td-subject">${esc(msg.subject)}</td>
      <td class="td-msg">${esc(msg.message)}</td>
      <td class="td-date">${formatDate(msg.createdAt)}</td>
      <td class="td-actions">
        <button class="btn-view" onclick='openModal(${JSON.stringify(msg).replace(/'/g,"&#39;")})'>
          <i class="fas fa-eye"></i> View
        </button>
        <button class="btn-del" onclick="copyEmail('${esc(msg.email)}')">
          <i class="fas fa-reply"></i> Reply
        </button>
      </td>
    </tr>
  `).join('');
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<span style="color:var(--dim);font-size:0.8rem">…</span>`;
    }
  }
  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openModal(msg) {
  document.getElementById('mName').textContent = msg.name;
  const emailEl = document.getElementById('mEmail');
  emailEl.textContent = msg.email;
  emailEl.href = `mailto:${msg.email}?subject=Re: ${encodeURIComponent(msg.subject)}`;
  document.getElementById('mSubject').textContent = msg.subject;
  document.getElementById('mDate').textContent = formatDate(msg.createdAt, true);
  document.getElementById('mMsg').textContent = msg.message;
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function copyEmail(email) {
  window.location.href = `mailto:${email}`;
}

function formatDate(dateStr, long = false) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  if (long) return d.toLocaleString('en-IN', { dateStyle: 'full', timeStyle: 'short' });
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Load on start
loadMessages();
// Auto-refresh every 60 seconds
setInterval(loadMessages, 60000);
</script>
</body>
</html>
